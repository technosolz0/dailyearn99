# Nginx Server Configuration for DailyEarn99
# Place this file in /etc/nginx/sites-available/dailyearn99 and link it to sites-enabled.
# NOTE: SSL certificates are managed by Certbot. After copying, run:
#   sudo certbot install --nginx -d dailyearn99.in -d www.dailyearn99.in -d api.dailyearn99.in -d admin.dailyearn99.in
# OR make sure the ssl_certificate paths below match what Certbot created.

# -------------------------------------------------------------
# 1. Main Website Next.js App (dailyearn99.in)
# -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name dailyearn99.in www.dailyearn99.in;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://dailyearn99.in$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dailyearn99.in www.dailyearn99.in;

    # SSL Certs (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/dailyearn99.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailyearn99.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy request to Next.js server running on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache Next.js build assets
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        expires 365d;
        access_log off;
    }

    # Cache public folder files
    location /public {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        expires 30d;
        access_log off;
    }
}

# -------------------------------------------------------------
# 2. API & WebSocket Service (api.dailyearn99.in)
# -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.dailyearn99.in;

    # Redirect all HTTP requests to HTTPS (Certbot will handle this automatically,
    # but here is the manual block for completeness/backup)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dailyearn99.in;

    # SSL Certs (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.dailyearn99.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dailyearn99.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Main API Routing
    location /api {
        proxy_pass http://127.0.0.1:9900/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for real-time API responses
        proxy_buffering off;
    }

    # WebSocket Leaderboard/Game routing (/ws/...)
    location /ws {
        proxy_pass http://127.0.0.1:9900/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep alive timeouts for active WebSockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Redirect root to API docs or status page
    location / {
        proxy_pass http://127.0.0.1:9900/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Maximum file upload size (for puzzle image uploads, etc.)
    client_max_body_size 20M;
}

# -------------------------------------------------------------
# 3. Admin Dashboard UI (admin.dailyearn99.in)
# -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.dailyearn99.in;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.dailyearn99.in;

    # SSL Certs (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/admin.dailyearn99.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.dailyearn99.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory of static files
    root /var/www/dailyearn99/backend/app/static;
    index index.html;

    # Serve Admin Static Files Directly via Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to prevent CORS issues on the admin panel
    location /api {
        proxy_pass http://127.0.0.1:9900/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /admin requests to the backend since FastAPI mounts the static panel at /admin
    location /admin {
        proxy_pass http://127.0.0.1:9900/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CSS/JS: no-cache so changes reflect immediately after deploy
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Images/icons: cache for 7 days (rarely change)
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
