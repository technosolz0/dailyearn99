# Nginx Server Configuration for DailyEarn99
# Place this file in /etc/nginx/sites-available/dailyearn99 and link it to sites-enabled.
# Make sure to run Certbot afterwards to provision Let's Encrypt SSL certificates.

# -------------------------------------------------------------
# 1. API & WebSocket Service (api.dailyearn99.in)
# -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.dailyearn99.in;

    # Redirect all HTTP requests to HTTPS (Certbot will handle this automatically,
    # but here is the manual block for completeness/backup)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dailyearn99.in;

    # SSL Certs (Configured by Certbot)
    # ssl_certificate /etc/letsencrypt/live/api.dailyearn99.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.dailyearn99.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Main API Routing
    location /api {
        proxy_pass http://127.0.0.1:9900/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for real-time API responses
        proxy_buffering off;
    }

    # WebSocket Leaderboard/Game routing (/ws/...)
    location /ws {
        proxy_pass http://127.0.0.1:9900/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep alive timeouts for active WebSockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Redirect root to API docs or status page
    location / {
        proxy_pass http://127.0.0.1:9900/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Maximum file upload size (for puzzle image uploads, etc.)
    client_max_body_size 20M;
}

# -------------------------------------------------------------
# 2. Admin Dashboard UI (admin.dailyearn99.in)
# -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.dailyearn99.in;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.dailyearn99.in;

    # SSL Certs (Configured by Certbot)
    # ssl_certificate /etc/letsencrypt/live/admin.dailyearn99.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/admin.dailyearn99.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory of static files
    root /var/www/dailyearn99/backend/app/static;
    index index.html;

    # Serve Admin Static Files Directly via Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to prevent CORS issues on the admin panel
    location /api {
        proxy_pass http://127.0.0.1:9900/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /admin requests to the backend since FastAPI mounts the static panel at /admin
    location /admin {
        proxy_pass http://127.0.0.1:9900/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser caching rules for assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
